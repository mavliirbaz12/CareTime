services:
  - type: web
    name: caretime-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    autoDeployTrigger: commit
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: CareTime
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_STACK
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CORS_ALLOWED_ORIGIN_PATTERNS
        value: ""
      - key: CORS_SUPPORTS_CREDENTIALS
        value: "false"
      - key: CORS_MAX_AGE
        value: "3600"
      - key: API_TOKEN_TTL_MINUTES
        value: "10080"
      - key: SESSION_DRIVER
        value: file
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: local
      - key: DESKTOP_WINDOWS_DOWNLOAD_URL
        sync: false
      - key: PAYROLL_MODE
        value: mock
      - key: PAYROLL_DEFAULT_CURRENCY
        value: INR
      - key: PAYROLL_STRIPE_DISABLE_SSL_VERIFY
        value: "false"
      - key: PAYROLL_STRIPE_RETURN_URL
        sync: false
      - key: PAYROLL_STRIPE_SUCCESS_URL
        sync: false
      - key: PAYROLL_STRIPE_CANCEL_URL
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_SSLMODE
        value: require
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
